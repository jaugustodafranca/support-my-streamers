<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main>
      <h1>Support My Streamers — Opções</h1>

      <section>
        <h2>Conta Twitch</h2>
        <label>
          Client-ID da sua aplicação Twitch
          <input id="clientId" type="text" placeholder="ex.: gp762nuuoqcoxypju8c569th9wz7q5" autocomplete="off" />
        </label>
        <p class="hint">
          Crie um app em <b>dev.twitch.tv/console/apps</b> e cole o Client-ID acima.
        </p>
        <p class="hint">No app da Twitch, cadastre exatamente este <b>OAuth Redirect URL</b>:</p>
        <code id="redirectUri" class="redirect">…</code>
      </section>

      <section>
        <h2>Rotação</h2>
        <label>
          Tempo de rotação (minutos)
          <input id="interval" type="number" min="1" max="120" />
        </label>
        <label>
          Número de abas simultâneas
          <input id="slots" type="number" min="1" max="4" />
        </label>
        <label>
          Áudio
          <select id="audio">
            <option value="muted">Mudo</option>
            <option value="on">Com som</option>
          </select>
        </label>
      </section>

      <div class="actions">
        <button id="save" class="primary">Salvar</button>
        <span id="saved" class="saved"></span>
      </div>
    </main>
    <script type="module" src="options.js"></script>
  </body>
</html>
