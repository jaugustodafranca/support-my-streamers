<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="../../icons/icon32.png" />
    <link rel="stylesheet" href="../theme.css" />
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main>
      <header class="page-head">
        <h1 class="wordmark">support<em>my</em>streamers</h1>
        <p class="tagline" id="t-tagline"></p>
      </header>

      <section class="panel about">
        <h2 id="t-about-title"></h2>
        <p class="about-text" id="t-about-text"></p>
      </section>

      <section class="panel">
        <div class="field">
          <div class="field-text">
            <label for="lang" id="t-lang-label"></label>
            <p class="field-hint" id="t-lang-hint"></p>
          </div>
          <div class="field-control">
            <select id="lang">
              <option value="pt">🇧🇷 Português</option>
              <option value="en">🇺🇸 English</option>
            </select>
          </div>
        </div>

        <div class="field">
          <div class="field-text">
            <label for="interval" id="t-time-label"></label>
            <p class="field-hint" id="t-time-hint"></p>
          </div>
          <div class="field-control time-control">
            <input id="interval" type="range" min="0" max="9" step="1" />
            <span class="time-val" id="time-val"></span>
          </div>
        </div>

        <div class="field">
          <div class="field-text">
            <label for="audio" id="t-audio-label"></label>
            <p class="field-hint" id="t-audio-hint"></p>
          </div>
          <div class="field-control">
            <select id="audio">
              <option value="muted" id="t-audio-muted"></option>
              <option value="on" id="t-audio-on"></option>
            </select>
          </div>
        </div>
      </section>

      <p class="saved" id="saved"></p>

      <footer class="site-foot">
        <p class="powered-by">
          <span id="t-powered-by"></span>
          <a href="https://zaintech.com.br" target="_blank" rel="noopener noreferrer">zaintech.com.br</a>
        </p>
      </footer>
    </main>
    <script type="module" src="options.js"></script>
  </body>
</html>
