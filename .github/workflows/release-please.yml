name: Release & Publish

# Two-step release (see CONTRIBUTING.md → "Release flow"):
#   1. Merge your feature PR into main.
#   2. Merge the Release PR that release-please opens (version bump + changelog).
#      That merge uploads a Store zip to the Chrome Web Store (draft — publish in the dashboard).
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4

      - name: Checkout (version already bumped)
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@v4

      - name: Package extension (Store build)
        if: ${{ steps.release.outputs.release_created }}
        run: |
          bash scripts/package.sh store
          VERSION=$(grep '"version"' manifest.json | head -1 | sed -E 's/.*"([0-9.]+)".*/\1/')
          cp "build/support-my-streamers-${VERSION}.zip" extension.zip

      - name: Upload to Chrome Web Store
        if: ${{ steps.release.outputs.release_created }}
        uses: mnao305/chrome-extension-upload@v5.0.0
        with:
          file-path: extension.zip
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}
          publish: false
