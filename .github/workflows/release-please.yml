name: Release & Publish

# On every push to main:
#  - release-please reads the commits (Conventional Commits) and maintains a
#    "Release PR" with the next version (patch/minor/major) decided by the messages.
#  - When you MERGE that PR, a release is created and the extension is published.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4

      # The steps below only run when a release was actually created
      # (i.e. when the Release PR was merged).
      - name: Checkout (version already bumped)
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@v4

      - name: Package extension
        if: ${{ steps.release.outputs.release_created }}
        run: zip -r extension.zip manifest.json src icons -x "*.DS_Store"

      - name: Upload + publish (Chrome Web Store)
        if: ${{ steps.release.outputs.release_created }}
        uses: mnao305/chrome-extension-upload@v5.0.0
        with:
          file-path: extension.zip
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}
          publish: true
