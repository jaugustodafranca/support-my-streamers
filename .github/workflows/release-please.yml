name: Release & Build

# Release flow (see CONTRIBUTING.md):
#   Merge a PR into main → release-please tags a release, bumps version, and attaches the Store zip.
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          skip-github-pull-request: true

      - name: Checkout (version already bumped)
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@v4

      - name: Package extension (Store build)
        if: ${{ steps.release.outputs.release_created }}
        run: |
          bash scripts/package.sh store
          VERSION=$(grep '"version"' manifest.json | head -1 | sed -E 's/.*"([0-9.]+)".*/\1/')
          cp "build/support-my-streamers-${VERSION}.zip" "support-my-streamers-${VERSION}.zip"

      - name: Upload zip to GitHub Release
        if: ${{ steps.release.outputs.release_created }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.release.outputs.tag_name }}" \
            "support-my-streamers-*.zip" \
            --clobber

      - name: Upload store zip artifact
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/upload-artifact@v4
        with:
          name: extension-store-zip
          path: support-my-streamers-*.zip
