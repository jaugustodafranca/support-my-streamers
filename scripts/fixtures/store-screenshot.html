<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>Store screenshot — Support My Streamers</title>
    <link rel="stylesheet" href="../../src/theme.css" />
    <link rel="stylesheet" href="../../src/popup/popup.css" />
    <style>
      html,
      body {
        margin: 0;
        width: 1280px;
        height: 800px;
        overflow: hidden;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(ellipse 80% 70% at 28% 42%, oklch(0.32 0.12 293 / 0.35), transparent 62%),
          linear-gradient(135deg, oklch(0.205 0.026 292) 0%, oklch(0.12 0.018 292) 55%, oklch(0.08 0.012 292) 100%);
      }

      .frame {
        display: flex;
        align-items: center;
        gap: 56px;
        padding: 0 72px;
        width: 100%;
        box-sizing: border-box;
      }

      .pitch {
        flex: 1;
        min-width: 0;
        max-width: 460px;
        color: var(--text);
      }

      .pitch .wordmark {
        font-size: 22px;
        margin-bottom: 28px;
        color: var(--text);
      }

      .pitch h2 {
        margin: 0 0 18px;
        font-family: var(--display);
        font-weight: 700;
        font-size: 46px;
        line-height: 1.08;
        letter-spacing: -0.03em;
        color: var(--text);
      }

      .pitch h2 em {
        font-style: normal;
        color: var(--violet);
      }

      .pitch p {
        margin: 0;
        color: var(--text-dim);
        font-size: 18px;
        line-height: 1.55;
        max-width: 34ch;
      }

      .popup-shell {
        flex: none;
        filter:
          drop-shadow(0 28px 56px oklch(0 0 0 / 0.55))
          drop-shadow(0 0 0 1px oklch(0.32 0.03 292 / 0.6));
        border-radius: var(--r-lg);
        overflow: hidden;
      }

      .popup-shell #app {
        width: 360px;
        max-height: 560px;
      }
    </style>
  </head>
  <body>
    <div class="frame">
      <div class="pitch">
        <h1 class="wordmark">support<em>my</em>streamers</h1>
        <h2>Apoie quem você <em>assiste.</em></h2>
        <p>
          Conecte sua Twitch, veja quem você segue que está ao vivo e deixe a
          rotação rolar.
        </p>
      </div>

      <div class="popup-shell">
        <div id="app">
          <header class="topbar">
            <h1 class="wordmark">support<em>my</em>streamers</h1>
            <div class="topbar-actions">
              <select class="lang-select" aria-label="Idioma">
                <option value="pt" selected>🇧🇷 PT</option>
                <option value="en">🇺🇸 EN</option>
              </select>
              <button class="icon-btn" type="button" aria-label="Opções">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="3" />
                  <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
                </svg>
              </button>
            </div>
          </header>

          <p class="greeting">
            Olá, <strong>eu_sou_o_zeh</strong> · <button class="textlink" type="button">Sair</button>
          </p>

          <div class="dock dock--single">
            <button class="play-btn wide" type="button">▶ Iniciar</button>
            <div class="ticker">2 selecionados</div>
          </div>

          <div class="popup-main">
            <div class="section-head">
              <span class="label"><span class="live-dot"></span>Ao vivo agora</span>
              <span class="count">4</span>
            </div>
            <ul class="channels">
              <li class="ch">
                <label class="ch-row">
                  <input type="checkbox" class="vh" checked />
                  <span class="switch"></span>
                  <span class="ch-info">
                    <span class="ch-name">Gaules</span>
                    <span class="ch-meta">Counter-Strike 2</span>
                  </span>
                  <span class="ch-viewers">42.1k</span>
                </label>
              </li>
              <li class="ch">
                <label class="ch-row">
                  <input type="checkbox" class="vh" checked />
                  <span class="switch"></span>
                  <span class="ch-info">
                    <span class="ch-name">Alanzoka</span>
                    <span class="ch-meta">Just Chatting</span>
                  </span>
                  <span class="ch-viewers">18.4k</span>
                </label>
              </li>
              <li class="ch">
                <label class="ch-row">
                  <input type="checkbox" class="vh" />
                  <span class="switch"></span>
                  <span class="ch-info">
                    <span class="ch-name">Cellbit</span>
                    <span class="ch-meta">Minecraft</span>
                  </span>
                  <span class="ch-viewers">9.7k</span>
                </label>
              </li>
              <li class="ch">
                <label class="ch-row">
                  <input type="checkbox" class="vh" />
                  <span class="switch"></span>
                  <span class="ch-info">
                    <span class="ch-name">LOUD_coringa</span>
                    <span class="ch-meta">VALORANT</span>
                  </span>
                  <span class="ch-viewers">6.2k</span>
                </label>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
